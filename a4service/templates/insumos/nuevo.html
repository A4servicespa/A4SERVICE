{% extends "base.html" %}

{% block title %}Nuevo Insumo{% endblock %}

{% block content %}

<h1 class="mb-4">Nuevo Insumo</h1>

<div class="card p-4 shadow-sm">

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" name="nombre" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Unidad (ej: m², litro, unidad)</label>
            <input type="text" name="unidad" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Costo Unitario</label>
            <input type="number" step="0.01" name="costo_unitario" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Categoría</label>
            <select name="categoria_id" class="form-control">
                <option value="">Sin categoría</option>
                {% for c in categorias %}
                <option value="{{ c.id }}">{{ c.nombre }}</option>
                {% endfor %}
            </select>
        </div>

        <button class="btn btn-success">Guardar</button>
        <a href="{{ url_for('insumos.lista') }}" class="btn btn-secondary">Volver</a>

    </form>

</div>

{% endblock %}
