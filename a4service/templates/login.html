<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - A4 Service SPA</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body class="login-body">
    {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} text-center">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}


<div class="login-container">

    <div class="login-card shadow-lg">

        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='img/logo.png') }}" class="login-logo" alt="Logo">
            <h3 class="fw-bold text-primary mt-3">A4 Service SPA</h3>
            <p class="text-muted">Acceso al sistema</p>
        </div>

        <!-- FORMULARIO CORREGIDO -->
        <form method="POST" action="{{ url_for('auth.login') }}">

            <div class="mb-3">
                <label class="form-label">Correo electrónico</label>
                <input type="email" name="email" class="form-control form-control-lg" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control form-control-lg" required>
            </div>

            <button class="btn btn-primary w-100 btn-lg login-btn">
                Iniciar Sesión
            </button>

        </form>

    </div>

</div>

</body>
</html>
